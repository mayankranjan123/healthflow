version: '3.8'

services:
  # Database Service
  database:
    image: postgres:15-alpine
    container_name: healthflow-db
    restart: always
    environment:
      POSTGRES_DB: healthflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthflow-api
    restart: always
    depends_on:
      - database
    environment:
      - PORT=8080
      - DATABASE_URL=jdbc:postgresql://database:5432/healthflow
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=root
      - JWT_SECRET=YOUR_SECURE_JWT_SIGNING_KEY
      - CORS_ALLOWED_ORIGINS=http://localhost,http://127.0.0.1
    volumes:
      - backend_uploads:/app/uploads

  # Frontend Nginx Web Server Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api/v1
    container_name: healthflow-web
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  backend_uploads:
