apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: healthflow-cert
spec:
  domains:
    - whatthecode.in
    - www.whatthecode.in

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: healthflow-ingress
  annotations:
    kubernetes.io/ingress.class: gce
    kubernetes.io/ingress.global-static-ip-name: "healthflow-static-ip"
    networking.gke.io/managed-certificates: "healthflow-cert"
spec:
  rules:
    - host: whatthecode.in
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 8080

    - host: www.whatthecode.in
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 8080