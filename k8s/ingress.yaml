apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: healthflow-ingress
  annotations:
    kubernetes.io/ingress.class: gce
    kubernetes.io/ingress.global-static-ip-name: "healthflow-static-ip"
spec:
  rules:
    - http:
        paths:
          # Route API endpoints directly to backend service
          - path: /api/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
          # Route all other UI requests to the static frontend server
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend-service
                port:
                  number: 8080
