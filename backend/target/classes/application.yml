spring:
  application:
    name: healthflow-api
  
  # Database Configuration
  datasource:
#    url: ${DATABASE_URL:jdbc:postgresql://bowed-herder-17640.jxf.gcp-asia-south1.cockroachlabs.cloud:26257/healthflow}
#    username: ${DATABASE_USERNAME:postgres}
#    password: ${DATABASE_PASSWORD:U8GcydLZv2p0tXpI6GncEw}
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/healthflow}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      pool-name: HealthFlowHikariPool

  # JPA & Hibernate Settings
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate # Production standard: always validate, use Flyway for schema
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: false
        jdbc:
          batch_size: 25
          fetch_size: 50
        order_inserts: true
        order_updates: true

  # Flyway Migrations
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    clean-disabled: false
    clean-on-validation-error: true

# Server Configuration
server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never # Security standard: never expose stack traces to client

# JWT & Security Properties
app:
  security:
    jwt:
      secret: ${JWT_SECRET:40248234857239487293847293847293847293847293847239487239487239487} # Minimal 512-bit signing key for local dev
      expiration-ms: 86400000 # 24 Hours
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Logging Configurations
logging:
  level:
    root: INFO
    com.healthflow: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: ERROR
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
